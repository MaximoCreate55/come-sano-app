 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CómeSanoApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif; }
        body { background: linear-gradient(135deg, #fefae0 0%, #e9edc9 100%); min-height: 100vh; display: flex; flex-direction: column; padding: 15px; align-items: center; padding-bottom: 140px; }
        
        .box { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 4px solid #d4a373; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; color: #d4a373; margin-bottom: 5px; }
        p { font-size: 1rem; color: #606c38; font-weight: bold; }
        
        .caja-manual { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 12px; margin-bottom: 15px; border: 2px solid #d4a373; text-align: center; }
        .input-codigo { padding: 10px; border-radius: 10px; border: 2px solid #ccc; width: 65%; font-size: 1rem; text-align: center; font-weight: bold; }
        .btn-manual { background: #023047; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .card-producto { background: #ffffff; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 24px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; border: 4px solid #ccc; display: none; }
        .card-producto.activo { display: flex; }
        .card-producto.verde { border-color: #2ec4b6; background-color: #f6fffb; }
        .card-producto.amarillo { border-color: #ffb703; background-color: #fffdf5; }
        .card-producto.rojo { border-color: #e71d36; background-color: #fff5f5; }
        
        .nombre-producto { font-size: 1.3rem; font-weight: bold; text-align: center; color: #333; margin-bottom: 10px; }
        .emoticon-indicador { font-size: 3.5rem; margin: 10px 0; }
        .veredicto-texto { font-size: 1.1rem; font-weight: 800; padding: 5px 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        
        .contenedor-boton-fijo { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; padding: 0 20px; z-index: 999; }
        .btn-magico { width: 100%; max-width: 360px; background: #ffb703; color: #023047; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 900; border: 4px solid #023047; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="box">
        <h1>🥕 CómeSanoApp 🍅</h1>
        <p>Conocé lo que comés</p>
    </div>

    <div class="caja-manual">
        <input type="number" id="input-manual" class="input-codigo" placeholder="Ej: 7791337007260">
        <button class="btn-manual" onclick="buscarCodigoManual()">Buscar</button>
    </div>

    <div class="card-producto" id="tarjeta-resultado">
        <div class="nombre-producto" id="res-nombre">Cargando...</div>
        <div class="emoticon-indicador" id="res-emoticon">🤔</div>
        <div class="veredicto-texto" id="res-veredicto">Analizando</div>
    </div>

    <div class="contenedor-boton-fijo">
        <button class="btn-magico" onclick="abrirCamaraPro()">📷 ¡ESCANEAR AHORA!</button>
    </div>

    <script>
        function abrirCamaraPro() {
            var ventanaCamara = window.open();
            var codigoHTML = `<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"><\/script>
            <style>
                body{margin:0; background:#000; color:white; text-align:center; font-family:sans-serif; overflow:hidden;} 
                #camara{width:100vw; height:75vh; position:relative;} 
                #camara video { width: 100%; height: 100%; object-fit: cover; }
                .visor-enfoque{position:absolute; top:50%; left:50%; width:280px; height:140px; margin-top:-70px; margin-left:-140px; border:4px solid #e71d36; border-radius:16px; box-shadow:0 0 0 9999px rgba(0,0,0,0.5); z-index:10; pointer-events:none;} 
                .linea-guia{position:absolute; top:50%; left:5%; width:90%; height:2px; background:#e71d36; box-shadow:0 0 8px #e71d36;}
                .info{padding:20px; font-size:1.1rem; font-weight:bold; background:#ffb703; color:#023047; height:25vh;}
            </style>
            </head><body>
            <div id="camara">
                <div class="visor-enfoque"><div class="linea-guia"></div></div>
            </div>
            <div class="info">🎯 Centrá el código de barras dentro del recuadro rojo.</div>
            <script>
                Quagga.init({
                    inputStream: {name: "Live", type: "LiveStream", target: document.querySelector('#camara'), constraints: {facingMode: "environment"}}, 
                    decoder: {readers: ["ean_reader"]}
                }, (err) => { Quagga.start(); }); 
                Quagga.onDetected((data) => { Quagga.stop(); window.opener.postMessage({valor: data.codeResult.code}, "*"); window.close(); });
            <\/script></body></html>`;
            ventanaCamara.document.write(codigoHTML);
            ventanaCamara.document.close();
        }

        function buscarCodigoManual() {
            var num = document.getElementById("input-manual").value;
            if (num) procesarBusqueda(num);
        }

        window.addEventListener("message", (event) => { if(event.data.valor) procesarBusqueda(event.data.valor); });

        function procesarBusqueda(codigo) {
            var tarjeta = document.getElementById("tarjeta-resultado");
            tarjeta.className = "card-producto activo";
            document.getElementById("res-nombre").innerText = "Buscando...";
            
            fetch(`https://ar.openfoodfacts.org/api/v2/product/${codigo}.json`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 1) {
                        var p = data.product;
                        var nombre = p.product_name || "Producto sin nombre";
                        var marcas = p.brands || "";
                        var nombreCompleto = marcas ? `${nombre} (${marcas})` : nombre;
                        var nLower = nombreCompleto.toLowerCase();
                        
                        document.getElementById("res-nombre").innerText = nombreCompleto;
                        
                        // REGLA DE ORO: Lácteos siempre VERDE (Súper Sano)
                        if ((nLower.includes("leche") || nLower.includes("yogurt") || nLower.includes("serenisima") || nLower.includes("lácteo")) && !nLower.includes("crema")) {
                            tarjeta.className = "card-producto activo verde";
                            document.getElementById("res-emoticon").innerText = "😃👍";
                            document.getElementById("res-veredicto").innerText = "¡SÚPER SANO!";
                            document.getElementById("res-veredicto").style.backgroundColor = "#2ec4b6";
                        } 
                        // Regla para Cremas
                        else if (nLower.includes("crema")) {
                            tarjeta.className = "card-producto activo amarillo";
                            document.getElementById("res-emoticon").innerText = "🤔";
                            document.getElementById("res-veredicto").innerText = "MODERADO";
                            document.getElementById("res-veredicto").style.backgroundColor = "#ffb703";
                        }
                        // Resto de los productos según Nutriscore
                        else {
                            var grade = p.nutriscore_grade || "c";
                            if (grade === "a" || grade === "b") {
                                tarjeta.className = "card-producto activo verde";
                                document.getElementById("res-emoticon").innerText = "😃";
                                document.getElementById("res-veredicto").innerText = "SANO";
                                document.getElementById("res-veredicto").style.backgroundColor = "#2ec4b6";
                            } else {
                                tarjeta.className = "card-producto activo rojo";
                                document.getElementById("res-emoticon").innerText = "🤢";
                                document.getElementById("res-veredicto").innerText = "OCASIONAL";
                                document.getElementById("res-veredicto").style.backgroundColor = "#e71d36";
                            }
                        }
                    } else {
                        document.getElementById("res-nombre").innerText = "No encontrado";
                        tarjeta.className = "card-producto activo";
                        document.getElementById("res-emoticon").innerText = "🤷‍♂️";
                        document.getElementById("res-veredicto").innerText = "DESCONOCIDO";
                    }
                });
        }
    </script>
</body>
</html>
