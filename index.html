 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CómeSanoApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #fdfaf0; min-height: 100vh; display: flex; flex-direction: column; padding: 15px; align-items: center; padding-bottom: 120px; }
        .box { background: white; padding: 20px; border-radius: 24px; border: 4px solid #d4a373; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .caja-manual { width: 100%; max-width: 400px; background: white; padding: 15px; border-radius: 16px; border: 2px solid #d4a373; margin-bottom: 20px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-manual { background: #023047; color: white; padding: 10px; border: none; border-radius: 8px; }
        .card-producto { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 3px solid #ccc; display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .card-producto.activo { display: flex; }
        .modal-alta { display: none; width: 100%; max-width: 400px; background: #fff5f5; padding: 20px; border-radius: 20px; border: 2px solid #e71d36; }
        .btn-grande { position: fixed; bottom: 20px; width: 90%; max-width: 360px; background: #ffb703; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 900; border: 3px solid #023047; cursor:pointer; }
    </style>
</head>
<body>

    <div class="box"><h1>🥕 CómeSanoApp 🍅</h1></div>

    <div class="caja-manual">
        <input type="number" id="input-manual" placeholder="Código de barras...">
        <button class="btn-manual" onclick="procesar(document.getElementById('input-manual').value)">Buscar</button>
    </div>

    <div id="res-card" class="card-producto">
        <h2 id="res-nombre" style="margin-bottom:10px;"></h2>
        <div id="res-msg"></div>
        <button id="btn-alta" style="display:none; background:#d4a373; color:white; padding:10px; border:none; border-radius:10px; margin-top:15px;" onclick="document.getElementById('modal-alta').style.display='flex'">➕ DAR DE ALTA</button>
    </div>

    <div id="modal-alta" class="modal-alta">
        <h3>📝 Registrar Producto</h3>
        <input type="text" id="alta-nom" placeholder="Nombre" style="width:100%; margin:5px 0;">
        <textarea id="alta-ing" placeholder="Ingredientes" style="width:100%; margin:5px 0;"></textarea>
        <button onclick="alert('Guardado!')" style="background:#2ec4b6; color:white; padding:10px; width:100%; border:none;">Registrar</button>
    </div>

    <button class="btn-grande" onclick="abrirCamara()">📷 ¡ESCANEAR!</button>

    <script>
        function abrirCamara() {
            var v = window.open("", "_blank");
            v.document.write(`<html><head><style>body{margin:0;background:black;} #camara{width:100%;height:100%;} .visor{position:absolute;top:30%;left:10%;width:80%;height:40%;border:4px solid red;z-index:99;box-shadow:0 0 0 999px rgba(0,0,0,0.5);}</style></head><body><div id="camara"><div class="visor"></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"><\/script><script>Quagga.init({inputStream:{type:"LiveStream",target:document.querySelector('#camara'),constraints:{facingMode:"environment"},area:{top:"30%",right:"10%",left:"10%",bottom:"30%"}},decoder:{readers:["ean_reader"]}},(e)=>{if(!e)Quagga.start()});Quagga.onDetected((d)=>{if(d.codeResult.code.length>=12){window.opener.postMessage(d.codeResult.code,"*");window.close();}})<\/script></body></html>`);
        }

        window.addEventListener("message", (e) => { procesar(e.data); });

        function procesar(codigo) {
            document.getElementById('res-card').className = "card-producto activo";
            document.getElementById('res-nombre').innerText = "Buscando...";
            document.getElementById('btn-alta').style.display = "none";
            document.getElementById('modal-alta').style.display = "none";

            fetch(`https://ar.openfoodfacts.org/api/v2/product/${codigo}.json`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 1 && data.product) {
                        document.getElementById('res-nombre').innerText = data.product.product_name || "Producto encontrado";
                        document.getElementById('res-msg').innerText = "✅ Producto hallado con éxito.";
                    } else {
                        document.getElementById('res-nombre').innerText = "No encontrado";
                        document.getElementById('res-msg').innerText = "Este código no figura en la base nacional.";
                        document.getElementById('btn-alta').style.display = "block";
                    }
                });
        }
    </script>
</body>
</html>
