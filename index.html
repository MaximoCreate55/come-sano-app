<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CómeSanoApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif; }
        body { background: linear-gradient(135deg, #fefae0 0%, #e9edc9 100%); min-height: 100vh; display: flex; flex-direction: column; padding: 15px; align-items: center; padding-bottom: 120px; }
        
        .box { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 4px solid #d4a373; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; color: #d4a373; margin-bottom: 5px; }
        p { font-size: 1rem; color: #606c38; font-weight: bold; }
        
        /* Botón Ergonómico Abajo */
        .contenedor-boton-fijo { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; padding: 0 20px; z-index: 999; }
        .btn-magico { width: 100%; max-width: 360px; background: #ffb703; color: #023047; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 900; border: 4px solid #023047; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        /* Tarjeta de Resultado */
        .grid-comparador { width: 100%; max-width: 400px; padding: 10px 5px; }
        .card-producto { background: #ffffff; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 24px; display: flex; flex-direction: column; align-items: center; width: 100%; border: 4px solid #ccc; display: none; }
        .card-producto.activo { display: flex; }
        .card-producto.verde { border-color: #2ec4b6; background-color: #f6fffb; }
        .card-producto.amarillo { border-color: #ffb703; background-color: #fffdf5; }
        .card-producto.rojo { border-color: #e71d36; background-color: #fff5f5; }
        
        .nombre-producto { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: #333; }
        .emoticon-indicador { font-size: 3.5rem; margin: 5px 0; }
        .veredicto-texto { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; padding: 5px 15px; border-radius: 12px; color: #fff; }
        .verde .veredicto-texto { background-color: #2ec4b6; }
        .amarillo .veredicto-texto { background-color: #ffb703; color: #023047; }
        .rojo .veredicto-texto { background-color: #e71d36; }
        
        .info-lista { list-style: none; font-size: 1rem; width: 100%; text-align: left; margin-bottom: 15px; }
        .info-lista li { margin-bottom: 10px; padding-left: 25px; position: relative; line-height: 1.4; font-weight: 500; }
        .info-lista li.pro::before { content: "✨"; position: absolute; left: 0; }
        .info-lista li.contra::before { content: "⚠️"; position: absolute; left: 0; }

        /* Botón Ver Más y Panel Desplegable */
        .btn-ver-mas { background: #023047; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 0.9rem; }
        .panel-detalles { display: none; width: 100%; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #ccc; text-align: left; }
        .panel-detalles.abierto { display: block; }
        .panel-detalles h4 { color: #023047; margin-bottom: 5px; font-size: 1rem; }
        .panel-detalles p { font-weight: normal; color: #444; font-size: 0.95rem; line-height: 1.4; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🥕 CómeSanoApp 🍅</h1>
        <p>Conocé lo que comés</p>
    </div>

    <div class="grid-comparador">
        <div class="card-producto" id="tarjeta-resultado">
            <div class="nombre-producto" id="res-nombre">Cargando...</div>
            <div class="emoticon-indicador" id="res-emoticon">🤔🔎</div>
            <div class="veredicto-texto" id="res-veredicto">Analizando</div>
            
            <ul class="info-lista" id="res-detalles"></ul>

            <!-- Sección Ver Más -->
            <button class="btn-ver-mas" id="btn-toggle-detalles" onclick="togglePersiana()" style="display:none;">👁️ Ver Letra Chica</button>
            <div class="panel-detalles" id="persiana-ingredientes">
                <h4>🔬 Ingredientes Reales:</h4>
                <p id="txt-ingredientes-reales">Lista...</p>
                <h4>🗣️ Traducción Criolla y Consecuencias:</h4>
                <p id="txt-traduccion-criolla">Traducción...</p>
            </div>
        </div>
    </div>

    <div class="contenedor-boton-fijo">
        <button class="btn-magico" onclick="abrirCamaraPro()">📷 ¡ESCANEAR AHORA!</button>
    </div>

    <script>
        function abrirCamaraPro() {
            var ventanaCamara = window.open();
            var codigoHTML = `
                <html>
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"><\/script>
                    <style>
                        body { margin: 0; background: #000; font-family: sans-serif; color: white; text-align: center; }
                        #camara { width: 100vw; height: 75vh; position: relative; }
                        #camara video { width: 100%; height: 100%; object-fit: cover; }
                        .linea { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #e71d36; box-shadow: 0 0 8px #e71d36; }
                        .info { padding: 20px; font-size: 1.2rem; font-weight: bold; background: #ffb703; color: #023047; }
                    </style>
                </head>
                <body>
                    <div id="camara"><div class="linea"></div></div>
                    <div class="info">🔍 Enfocá bien el código de barras de fondo...</div>
                    <script>
                        Quagga.init({
                            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#camara'), constraints: { facingMode: "environment" } },
                            decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
                        }, function(err) {
                            if (err) { alert("Error de cámara: " + err); return; }
                            Quagga.start();
                        });
                        Quagga.onDetected(function(data) {
                            var codigo = data.codeResult.code;
                            // CAPA 1 ANTI-FRUSTRACIÓN: Si es un código incompleto/corto, lo ignora y sigue buscando
                            if (codigo.length < 8) return; 
                            
                            Quagga.stop();
                            window.opener.postMessage(codigo, "*");
                            window.close();
                        });
                    <\/script>
                </body>
                </html>
            `;
            ventanaCamara.document.write(codigoHTML);
            ventanaCamara.document.close();
        }

        function togglePersiana() {
            var p = document.getElementById("persiana-ingredientes");
            var b = document.getElementById("btn-toggle-detalles");
            if (p.className === "panel-detalles") {
                p.className = "panel-detalles abierto";
                b.innerText = "🙈 Ocultar Detalles";
            } else {
                p.className = "panel-detalles";
                b.innerText = "👁️ Ver Letra Chica";
            }
        }

        window.addEventListener("message", function(event) {
            var codigoLeido = event.data;
            if (!codigoLeido) return;

            var tarjeta = document.getElementById("tarjeta-resultado");
            var txtNombre = document.getElementById("res-nombre");
            var txtEmoticon = document.getElementById("res-emoticon");
            var txtVeredicto = document.getElementById("res-veredicto");
            var listaDetalles = document.getElementById("res-detalles");
            var btnVerMas = document.getElementById("btn-toggle-detalles");
            var persiana = document.getElementById("persiana-ingredientes");
            var txtIngReales = document.getElementById("txt-ingredientes-reales");
            var txtTradCriolla = document.getElementById("txt-traduccion-criolla");

            // Reseteamos estados
            tarjeta.className = "card-producto activo";
            txtNombre.innerText = "Buscando en góndola digital...";
            btnVerMas.style.display = "none";
            persiana.className = "panel-detalles";

            fetch(`https://ar.openfoodfacts.org/api/v2/product/${codigoLeido}.json`)
                .then(response => response.json())
                .then(data => {
                    // CAPA 2: Identifica si la lectura fue buena pero el código REALMENTE no existe
                    if (data.status === 1 && data.product) {
                        var producto = data.product;
                        var nombreReal = producto.product_name || "Producto Encontrado";
                        var marcas = producto.brands || "";
                        var ingredientesTexto = producto.ingredients_text_es || producto.ingredients_text || "No declarados en la base pública.";
                        
                        txtNombre.innerText = marcas ? `${nombreReal} (${marcas})` : nombreReal;
                        txtIngReales.innerText = ingredientesTexto;
                        btnVerMas.style.display = "block";

                        var textoMinuscula = ingredientesTexto.toLowerCase();
                        var tieneJMAF = textoMinuscula.includes("jarabe") || textoMinuscula.includes("fructosa");
                        var tieneAdit = textoMinuscula.includes("ins ") || textoMinuscula.includes("saboriz") || textoMinuscula.includes("resaltador");

                        // CLASIFICADOR Y ORDEN DE EMOJIS CORREGIDO (CARITA PRIMERO, MANO DESPUÉS)
                        if (tieneJMAF && tieneAdit) {
                            // ROJO
                            tarjeta.className = "card-producto activo rojo";
                            txtEmoticon.innerText = "🤢👎";
                            txtVeredicto.innerText = "¡Ojo! Consumo Ocasional";
                            listaDetalles.innerHTML = `
                                <li class="contra">Contiene Jarabe de Maíz (JMAF) y aditivos químicos pesados.</li>
                                <li class="contra">Ultraprocesado diseñado para generar adicción al sabor.</li>
                            `;
                            txtTradCriolla.innerText = "Este producto está altamente manipulado en laboratorio. El JMAF impacta directo en el hígado y los aditivos INS camuflan ingredientes de baja calidad para que sigan siendo ricos al paladar. Evitalo en el día a día.";
                        } else if (tieneJMAF || tieneAdit) {
                            // AMARILLO - NUEVO GESTO EMOJI SIN LA SEÑA CONFUSA
                            tarjeta.className = "card-producto activo amarillo";
                            txtEmoticon.innerText = "🤔🔎 🤷‍♂️";
                            txtVeredicto.innerText = "Moderado / Intermedio";
                            listaDetalles.innerHTML = `
                                <li class="contra">Tiene algunos componentes industriales en su receta.</li>
                                <li class="pro">No es el peor de la góndola, pero leé la letra chica.</li>
                            `;
                            txtTradCriolla.innerText = "Tiene un procesamiento moderado. Cuenta con agregados químicos o azúcares para estirar su duración en góndola. No es veneno, pero tampoco es un alimento natural. Consumilo con conciencia.";
                        } else {
                            // VERDE
                            tarjeta.className = "card-producto activo verde";
                            txtEmoticon.innerText = "😃👍";
                            txtVeredicto.innerText = "¡Súper Sano!";
                            listaDetalles.innerHTML = `
                                <li class="pro">Ingredientes limpios, nobles y reales. ¡Excelente!</li>
                                <li class="pro">Pocos procesos encima. Combustible premium para tu cuerpo.</li>
                            `;
                            txtTradCriolla.innerText = "¡Alimento real! Al leer la etiqueta se nota que son componentes que podrías tener en la cocina de tu casa. Sin químicos raros destinados a engañar a tus papilas gustativas.";
                        }
                    } else {
                        // CÓDIGO CORRECTO PERO NO EXISTE EN LA BASE DE DATOS
                        tarjeta.className = "card-producto activo";
                        txtEmoticon.innerText = "🤷‍♂️❓";
                        txtNombre.innerText = `Código: ${codigoLeido}`;
                        txtVeredicto.innerText = "No Registrado";
                        txtVeredicto.style.backgroundColor = "#ccc";
                        txtVeredicto.style.color = "#333";
                        listaDetalles.innerHTML = `
                            <li class="contra" style="list-style:none; text-align:center;">¡Confirmado! Este código es válido pero el producto aún no fue subido por la comunidad argentina.</li>
                            <li class="pro" style="list-style:none; margin-top:15px; font-weight:bold; color:#ffb703; text-align:center; font-size:1.1rem;">✨ [PRÓXIMAMENTE: BOTÓN PARA DAR DE ALTA] ✨</li>
                        `;
                    }
                    tarjeta.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                })
                .catch(error => {
                    txtNombre.innerText = "Error de red al conectar el caño.";
                    console.error(error);
                });
        });
    </script>
</body>
</html>
