<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CómeSanoApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif; }
        body { background: linear-gradient(135deg, #fefae0 0%, #e9edc9 100%); min-height: 100vh; display: flex; flex-direction: column; padding: 15px; align-items: center; padding-bottom: 110px; } /* Espacio abajo para que el botón no tape nada */
        
        .box { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 4px solid #d4a373; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; color: #d4a373; margin-bottom: 5px; }
        p { font-size: 1rem; color: #606c38; font-weight: bold; }
        
        /* BOTÓN ABAJO: Ergonómico para usar con una sola mano */
        .contenedor-boton-fijo { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; padding: 0 20px; z-index: 999; }
        .btn-magico { width: 100%; max-width: 360px; background: #ffb703; color: #023047; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 900; border: 4px solid #023047; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .btn-magico:active { transform: scale(0.95); }

        /* Carrusel Dinámico */
        .grid-comparador { display: flex; gap: 20px; overflow-x: auto; width: 100%; max-width: 400px; padding: 10px 5px; scroll-snap-type: x mandatory; }
        .grid-comparador::-webkit-scrollbar { display: none; }
        
        .card-producto { background: #ffffff; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 24px; display: flex; flex-direction: column; align-items: center; min-width: 100%; width: 100%; scroll-snap-align: center; border: 4px solid #ccc; display: none; } /* Nacen ocultas hasta que escanees */
        .card-producto.activo { display: flex; }
        .card-producto.verde { border-color: #2ec4b6; background-color: #f6fffb; }
        .card-producto.rojo { border-color: #e71d36; background-color: #fff5f5; }
        
        .nombre-producto { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: #333; }
        .emoticon-indicador { font-size: 4rem; margin: 5px 0; }
        .veredicto-texto { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; padding: 5px 15px; border-radius: 12px; color: #fff; }
        .verde .veredicto-texto { background-color: #2ec4b6; }
        .rojo .veredicto-texto { background-color: #e71d36; }
        
        .info-lista { list-style: none; font-size: 1rem; width: 100%; text-align: left; }
        .info-lista li { margin-bottom: 10px; padding-left: 25px; position: relative; line-height: 1.4; font-weight: 500; }
        .info-lista li.pro::before { content: "✨"; position: absolute; left: 0; }
        .info-lista li.contra::before { content: "⚠️"; position: absolute; left: 0; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🥕 CómeSanoApp 🍅</h1>
        <p>Conocé lo que comés</p>
    </div>

    <!-- Carrusel donde se inyectará el resultado real de internet -->
    <div class="grid-comparador" id="carrusel">
        <div class="card-producto" id="tarjeta-resultado">
            <div class="nombre-producto" id="res-nombre">Cargando producto...</div>
            <div class="emoticon-indicador" id="res-emoticon">🤔</div>
            <div class="veredicto-texto" id="res-veredicto">Analizando</div>
            <ul class="info-lista" id="res-detalles">
                <!-- Los detalles se crean solos acá -->
            </ul>
        </div>
    </div>

    <!-- BOTÓN ABAJO DEL TODO: Fácil acceso con una mano -->
    <div class="contenedor-boton-fijo">
        <button class="btn-magico" onclick="abrirCamaraPro()">📷 ¡ESCANEAR AHORA!</button>
    </div>

    <script>
        function abrirCamaraPro() {
            var ventanaCamara = window.open();
            var codigoHTML = `
                <html>
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"><\/script>
                    <style>
                        body { margin: 0; background: #000; font-family: sans-serif; color: white; text-align: center; }
                        #camara { width: 100vw; height: 75vh; position: relative; }
                        #camara video { width: 100%; height: 100%; object-fit: cover; }
                        .linea { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #e71d36; box-shadow: 0 0 8px #e71d36; }
                        .info { padding: 20px; font-size: 1.2rem; font-weight: bold; background: #ffb703; color: #023047; }
                    </style>
                </head>
                <body>
                    <div id="camara"><div class="linea"></div></div>
                    <div class="info">🔍 Apuntá al código de barras de cualquier alimento...</div>
                    <script>
                        Quagga.init({
                            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#camara'), constraints: { facingMode: "environment" } },
                            decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
                        }, function(err) {
                            if (err) { alert("Error: " + err); return; }
                            Quagga.start();
                        });
                        Quagga.onDetected(function(data) {
                            var codigo = data.codeResult.code;
                            Quagga.stop();
                            window.opener.postMessage(codigo, "*");
                            window.close();
                        });
                    <\/script>
                </body>
                </html>
            `;
            ventanaCamara.document.write(codigoHTML);
            ventanaCamara.document.close();
        }

        // EL "CAÑO" DE DATOS: Escucha el código de barras y busca en internet
        window.addEventListener("message", function(event) {
            var codigoLeido = event.data;
            if (!codigoLeido) return;

            var tarjeta = document.getElementById("tarjeta-resultado");
            var txtNombre = document.getElementById("res-nombre");
            var txtEmoticon = document.getElementById("res-emoticon");
            var txtVeredicto = document.getElementById("res-veredicto");
            var listaDetalles = document.getElementById("res-detalles");

            // Mostramos la tarjeta en modo "Cargando..."
            tarjeta.className = "card-producto activo";
            txtNombre.innerText = "Buscando en góndola digital...";

            // Consultamos la API real de Open Food Facts Argentina
            fetch(`https://ar.openfoodfacts.org/api/v2/product/${codigoLeido}.json`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 1 && data.product) {
                        var producto = data.product;
                        var nombreReal = producto.product_name || "Producto Desconocido";
                        var marcas = producto.brands || "";
                        
                        txtNombre.innerText = marcas ? `${nombreReal} (${marcas})` : nombreReal;

                        // LÓGICA DE FILTRADO CRIOLLO SIMPLIFICADA
                        // Miramos cuántos sellos de advertencia tiene cargados
                        var cantidadSellos = producto.nutriscore_grade || "c"; 
                        var esUltraprocesado = producto.ingredients_text_with_allergens && 
                            (producto.ingredients_text_with_allergens.toLowerCase().includes("jarabe") || 
                             producto.ingredients_text_with_allergens.toLowerCase().includes("espesante") ||
                             producto.ingredients_text_with_allergens.toLowerCase().includes("ins "));

                        if (esUltraprocesado || cantidadSellos === 'd' || cantidadSellos === 'e') {
                            // Respuesta para producto ROJO
                            tarjeta.className = "card-producto activo rojo";
                            txtEmoticon.innerText = "👎🤢";
                            txtVeredicto.innerText = "¡Ojo! Consumo Ocasional";
                            listaDetalles.innerHTML = `
                                <li class="contra">Encontramos aditivos industriales o jarabes en su receta.</li>
                                <li class="contra">La letra chica esconde ingredientes muy refinados.</li>
                            `;
                        } else {
                            // Respuesta para producto VERDE
                            tarjeta.className = "card-producto activo verde";
                            txtEmoticon.innerText = "👍😃";
                            txtVeredicto.innerText = "¡Súper Sano!";
                            listaDetalles.innerHTML = `
                                <li class="pro">Ingredientes limpios y cercanos a su estado natural.</li>
                                <li class="pro">Pocos procesos industriales encima. ¡Aprobado!</li>
                            `;
                        }
                    } else {
                        // Si el producto no existe en la base de datos abierta
                        tarjeta.className = "card-producto activo";
                        txtEmoticon.innerText = "🤷‍♂️🧐";
                        txtNombre.innerText = `Código: ${codigoLeido}`;
                        txtVeredicto.innerText = "No Encontrado";
                        txtVeredicto.style.backgroundColor = "#ccc";
                        listaDetalles.innerHTML = `
                            <li class="contra" style="list-style:none;">¡Uy! Este producto todavía no está en la base de datos nacional.</li>
                            <li class="pro" style="list-style:none; margin-top:10px; font-weight:bold; color:#ffb703;">[Próximamente: Botón para dar de Alta]</li>
                        `;
                    }
                    tarjeta.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                })
                .catch(error => {
                    txtNombre.innerText = "Error al conectar con el servidor.";
                    console.error(error);
                });
        });
    </script>
</body>
</html>
